# https://taskfile.dev

version: 3

tasks:

  build:
    cmds:
      - go build -ldflags "-X github.com/noqqe/mtghistory/pkg/mtghistory.Version=`git describe --tags`" -v cmd/mtghistory/mtghistory.go
    sources:
      - "pkg/mtghistory/**/*.go"
      - "cmd/mtghistory/mtghistory.go"
    generates:
      - "./mtghistory"

  run:
    deps: [build]
    cmds:
      - ./mtghistory {{.CLI_ARGS}}

  release:
    cmds:
      - git tag
      - read -p "Version v1.1.1 " version ; git tag $version ; docker build -t ghcr.io/noqqe/mtghistory:$version . ;  docker push ghcr.io/noqqe/mtghistory:$version
      - git push --tags
    interactive: true

  default:
    cmds:
      - task: build
